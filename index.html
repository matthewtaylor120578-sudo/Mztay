<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0D1B33" />

    <title>Dyno Nobel &times; P&amp;C Partners — Executive Search</title>
    <meta
      name="description"
      content="P&C Partners is Dyno Nobel's executive search partner for the relocation of its global headquarters to Brisbane."
    />

    <link rel="preconnect" href="https://fonts.cdnfonts.com" crossorigin />
    <link rel="stylesheet" href="microsite.css?v=5" />
  </head>

  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <main id="main">
      <section class="hero" id="hero">
        <div
          class="hero__photo"
          style="background-image: url('assets/pc_team.jpg');"
          aria-hidden="true"
        ></div>

        <div class="hero__band">
          <div class="container hero__band-inner">
            <p class="hero__statement">
              <img
                class="hero__statement-logo"
                src="assets/pc_logo_white.svg"
                alt="P&amp;C Partners"
              />
              <span class="hero__statement-light">are proud to be partnering with</span>
            </p>
            <img
              class="hero__client-logo"
              src="assets/dyno_nobel_navy.png"
              alt="Dyno Nobel"
            />
          </div>
        </div>

        <a class="hero__scroll" href="#main" aria-label="Scroll to content">
          <span class="label">Scroll</span>
          <span class="hero__scroll-line" aria-hidden="true"></span>
        </a>
      </section>
    </main>
  </body>
</html>
